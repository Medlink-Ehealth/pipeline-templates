name: Node.js CI Pipeline

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      pnpm-version:
        description: "pnpm version to use (optional, will use latest if not specified)"
        required: false
        type: string
        default: "9"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      coverage-threshold:
        description: "Minimum code coverage percentage"
        required: false
        type: number
        default: 70
      dockerfile-path:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: ""
      docker-context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      acr-login-server:
        description: "Azure Container Registry login server (e.g. myregistry.azurecr.io)"
        required: false
        type: string
        default: ""
      image-name:
        description: "Docker image name"
        required: false
        type: string
        default: ""
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Secrets Scan
  # ──────────────────────────────────────────────
  Gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ──────────────────────────────────────────────
  # Docker Build + Trivy Scan
  # ──────────────────────────────────────────────
  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [Gitleaks]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: false
          load: true
          tags: ${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ inputs.image-name }}:${{ github.sha }}
          format: sarif #sarif (diff option)
          exit-code: "1"
          vuln-type: 'os,library'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security           # upload even when the scan step fails
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ──────────────────────────────────────────────
  # Push to Azure Container Registry (OIDC)
  # ──────────────────────────────────────────────
  ACR-Push:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: github.ref == 'refs/heads/main' && inputs.acr-login-server != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ inputs.acr-login-server }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: |
            ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ github.sha }}
            ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
