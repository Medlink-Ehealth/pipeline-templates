name: Node.js CI Pipeline

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      working-directory:
        description: "Working directory for the project"
        required: false
        type: string
        default: "."
      coverage-threshold:
        description: "Minimum code coverage percentage"
        required: false
        type: number
        default: 70
      dockerfile-path:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      docker-context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      acr-login-server:
        description: "Azure Container Registry login server (e.g. myregistry.azurecr.io)"
        required: false
        type: string
        default: ""
      image-name:
        description: "Docker image name"
        required: false
        type: string
        default: ""
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────
  # Lint & Type Check
  # ──────────────────────────────────────────────
  lint-and-typecheck:
    name: ESLint + Prettier + TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings 0

      - name: Check Prettier formatting
        run: npx prettier --check .

      - name: TypeScript type check
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Test & Coverage
  # ──────────────────────────────────────────────
  test:
    name: Vitest Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.thresholds.lines=${{ inputs.coverage-threshold }} --coverage.thresholds.functions=${{ inputs.coverage-threshold }} --coverage.thresholds.branches=${{ inputs.coverage-threshold }} --coverage.thresholds.statements=${{ inputs.coverage-threshold }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage/
          retention-days: 14

  # ──────────────────────────────────────────────
  # CodeQL SAST Analysis
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ──────────────────────────────────────────────
  # Secrets Scan
  # ──────────────────────────────────────────────
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ──────────────────────────────────────────────
  # Docker Build + Trivy Scan
  # ──────────────────────────────────────────────
  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: false
          load: true
          tags: app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: app:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ──────────────────────────────────────────────
  # Push to Azure Container Registry (OIDC)
  # ──────────────────────────────────────────────
  acr-push:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: [docker-build-scan, codeql, gitleaks]
    if: github.ref == 'refs/heads/main' && inputs.acr-login-server != ''
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Azure login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ inputs.acr-login-server }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: |
            ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:${{ github.sha }}
            ${{ inputs.acr-login-server }}/${{ inputs.image-name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
